# ═══════════════════════════════════════════════════════════════════════════════
# Driver Profile Template — Clone Forge
# ═══════════════════════════════════════════════════════════════════════════════
# Template para o perfil de drivers psicologicos de um clone.
# Usado pelo @cognitive-motor durante inferencia (Fase 4).
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# 04-drivers/mind-drivers.yaml
# ─────────────────────────────────────────────────────────────────────────────

mind_drivers_template:
  metadata:
    mind_name: "{mind_name}"
    mind_slug: "{mind_slug}"
    generated_at: "{iso_date}"
    agent: "cognitive-motor"
    mius_analyzed: 0
    drivers_inferred: 0

  # Top drivers ordenados por forca
  top_drivers:
    - rank: 1
      driver_id: "{driver_catalog_id}"
      name: "{driver_name}"
      category: "{cognitive|emotional|motivational|social|behavioral|meta}"
      strength: 0       # 0-100
      confidence: 0.0   # 0.0-1.0
      evidence_count: 0
      evidence_mius: [] # ["MIU-XXXX", ...]
      description: "{como se manifesta nessa pessoa especifica}"

  # Todos os drivers agrupados por categoria
  by_category:
    cognitive: []
    emotional: []
    motivational: []
    social: []
    behavioral: []
    meta: []

# ─────────────────────────────────────────────────────────────────────────────
# 04-drivers/driver-evidence.yaml
# ─────────────────────────────────────────────────────────────────────────────

driver_evidence_template:
  metadata:
    mind_slug: "{mind_slug}"
    generated_at: "{iso_date}"

  # Cadeia MIU → driver
  evidence_chains:
    - driver_id: "{driver_id}"
      driver_name: "{name}"
      mius:
        - miu_id: "MIU-XXXX"
          content_excerpt: "{primeiras 50 palavras}"
          category: "{MIU category}"
          confidence: 0.0
          contribution: "{como este MIU evidencia o driver}"

# ─────────────────────────────────────────────────────────────────────────────
# 04-drivers/driver-relationships.yaml
# ─────────────────────────────────────────────────────────────────────────────

driver_relationships_template:
  metadata:
    mind_slug: "{mind_slug}"
    generated_at: "{iso_date}"
    total_relationships: 0

  relationships:
    - id: "REL-001"
      type: "{AMPLIFIES|CONFLICTS|CONDITIONAL|COMPENSATES|SYNERGIZES|MASKS|TRIGGERS}"
      driver_a:
        id: "{driver_id}"
        name: "{name}"
      driver_b:
        id: "{driver_id}"
        name: "{name}"
      direction: "{A→B|A↔B|A→B if C}"
      condition: null
      strength: 0.0
      confidence: 0.0
      evidence_mius: []
      note: ""

  # Paradoxos produtivos (subset de CONFLICTS que sao features)
  productive_paradoxes:
    - name: "{nome do paradoxo}"
      driver_a: "{driver_id}"
      driver_b: "{driver_id}"
      resolution: "{como a pessoa resolve/convive com a tensao}"
      evidence: "{MIU ou citacao}"

# ─────────────────────────────────────────────────────────────────────────────
# 04-drivers/driver-report.md
# ─────────────────────────────────────────────────────────────────────────────

driver_report_template: |
  # Driver Report — {mind_name}

  **Data:** {date}
  **Agente:** @cognitive-motor
  **MIUs analisados:** {mius_count}
  **Drivers inferidos:** {drivers_count}
  **Relacoes detectadas:** {relationships_count}

  ## Top 10 Drivers

  | # | Driver | Categoria | Forca | Confianca | Evidencias |
  |---|--------|-----------|-------|-----------|------------|
  | 1 | {name} | {cat} | {str}/100 | {conf} | {count} MIUs |
  {... repeat for top 10}

  ## Distribuicao por Categoria

  | Categoria | Drivers | % | Forca Media |
  |-----------|---------|---|-------------|
  | Cognitive | {n} | {%} | {avg} |
  | Emotional | {n} | {%} | {avg} |
  | Motivational | {n} | {%} | {avg} |
  | Social | {n} | {%} | {avg} |
  | Behavioral | {n} | {%} | {avg} |
  | Meta | {n} | {%} | {avg} |

  ## Paradoxos Produtivos

  {lista de paradoxos com resolucao}

  ## Clusters de Amplificacao

  {grupos de drivers que se amplificam mutuamente}

  ## Insights

  {observacoes qualitativas sobre o perfil psicologico}
