# =============================================================================
# Clone Forge — Driver Catalog
# =============================================================================
# Catalogo de drivers psicologicos para clonagem cognitiva de experts.
# Curado a partir de literatura de psicologia (Big Five, MBTI, Enneagram, DISC,
# vieses cognitivos, padroes de comunicacao) com taxonomia propria do Clone Forge.
#
# Cada driver representa um traco mensuravel que compoe o perfil cognitivo,
# emocional, motivacional, social, comportamental ou meta-cognitivo de um expert.
#
# Fontes: Big Five (OCEAN 30 facets), MBTI (8 funcoes cognitivas),
#         Enneagram (27 subtipos), DISC, vieses cognitivos, padroes de
#         comunicacao, estilos de decisao, hierarquia de valores,
#         padroes comportamentais.
# =============================================================================

version: "1.0.0"
total_drivers: 251

categories:
  cognitive: "Padroes de pensamento, processamento de informacao, tomada de decisao"
  emotional: "Padroes emocionais, regulacao, reatividade"
  motivational: "O que impulsiona acao, valores, metas"
  social: "Interacao, influencia, comunicacao"
  behavioral: "Habitos, rotinas, padroes de acao"
  meta: "Auto-percepcao, metacognicao, auto-regulacao"

drivers:

  # ===========================================================================
  # COGNITIVE — Padroes de pensamento, processamento, decisao
  # ===========================================================================
  cognitive:

    # ---- Big Five: Openness facets ----
    - id: COG-001
      name: "Analytical Thinking"
      description: "Tendency to break down complex problems into components before acting"
      indicators:
        - "Uses structured frameworks to organize information"
        - "Asks 'why' before 'how'"
        - "Creates categories and taxonomies naturally"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Intellect", "MBTI: Ti/Te"]

    - id: COG-002
      name: "Imaginative Ideation"
      description: "Capacity to generate novel ideas and envision possibilities that don't yet exist"
      indicators:
        - "Frequently proposes unconventional solutions"
        - "Uses metaphors and analogies to explain concepts"
        - "Daydreams productively about future scenarios"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Fantasy", "MBTI: Ne"]

    - id: COG-003
      name: "Aesthetic Sensitivity"
      description: "Awareness and appreciation of beauty, design, and sensory experience"
      indicators:
        - "Notices visual details others miss"
        - "Values elegance in solutions and presentations"
        - "Responds strongly to art, music, or design quality"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Aesthetics", "MBTI: Se/Fi"]

    - id: COG-004
      name: "Intellectual Curiosity"
      description: "Intrinsic drive to learn, explore ideas, and understand how things work"
      indicators:
        - "Reads widely across multiple domains"
        - "Asks deep follow-up questions"
        - "Pursues knowledge for its own sake"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Ideas", "MBTI: Ne/Ti"]

    - id: COG-005
      name: "Experiential Openness"
      description: "Willingness to try new activities, foods, cultures, and ways of living"
      indicators:
        - "Seeks novel experiences deliberately"
        - "Adapts quickly to unfamiliar environments"
        - "Embraces change rather than resisting it"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Actions", "MBTI: Se/Ne"]

    - id: COG-006
      name: "Values Flexibility"
      description: "Openness to reexamining personal values and considering alternative worldviews"
      indicators:
        - "Engages with opposing viewpoints without defensiveness"
        - "Updates beliefs when presented with compelling evidence"
        - "Tolerates ambiguity in moral questions"
      strength_scale: "0-100"
      related_systems: ["Big Five: Openness-Values", "MBTI: Ne/Fi"]

    # ---- MBTI Cognitive Functions ----
    - id: COG-007
      name: "Introverted Thinking (Ti)"
      description: "Internal logical framework for categorizing and understanding how things work"
      indicators:
        - "Builds internal models of systems"
        - "Values logical consistency over external validation"
        - "Deconstructs arguments to find flaws"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ti", "Big Five: Openness-Intellect"]

    - id: COG-008
      name: "Extraverted Thinking (Te)"
      description: "Drive to organize the external world through systems, plans, and measurable outcomes"
      indicators:
        - "Creates processes and SOPs naturally"
        - "Focuses on efficiency and measurable results"
        - "Makes decisions based on objective data"
      strength_scale: "0-100"
      related_systems: ["MBTI: Te", "Big Five: Conscientiousness-Order"]

    - id: COG-009
      name: "Introverted Intuition (Ni)"
      description: "Ability to perceive deep patterns and converge on singular future visions"
      indicators:
        - "Has strong hunches that prove accurate"
        - "Sees the endpoint before the path"
        - "Thinks in symbols and archetypes"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni", "Big Five: Openness-Ideas"]

    - id: COG-010
      name: "Extraverted Intuition (Ne)"
      description: "Capacity to see multiple possibilities, connections, and divergent paths simultaneously"
      indicators:
        - "Brainstorms rapidly and prolifically"
        - "Connects disparate ideas across domains"
        - "Gets excited by 'what if' questions"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ne", "Big Five: Openness-Ideas"]

    - id: COG-011
      name: "Introverted Sensing (Si)"
      description: "Rich internal library of past experiences used as reference for present decisions"
      indicators:
        - "References past experiences to guide decisions"
        - "Notices when something deviates from established patterns"
        - "Values tradition and proven methods"
      strength_scale: "0-100"
      related_systems: ["MBTI: Si", "Big Five: Conscientiousness-Dutifulness"]

    - id: COG-012
      name: "Extraverted Sensing (Se)"
      description: "Acute awareness of the present moment and concrete physical environment"
      indicators:
        - "Responds quickly to real-time changes"
        - "Engages fully with sensory details"
        - "Prefers hands-on experience over theory"
      strength_scale: "0-100"
      related_systems: ["MBTI: Se", "Big Five: Extraversion-Excitement Seeking"]

    # ---- Cognitive Biases ----
    - id: COG-013
      name: "Confirmation Bias Tendency"
      description: "Degree to which one seeks information that confirms existing beliefs"
      indicators:
        - "Gravitates toward sources that agree with current views"
        - "Dismisses contradictory evidence quickly"
        - "Interprets ambiguous data in favor of existing hypothesis"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Big Five: Openness (inverse)"]

    - id: COG-014
      name: "Anchoring Effect Sensitivity"
      description: "Tendency to rely heavily on the first piece of information encountered"
      indicators:
        - "Initial numbers strongly influence final estimates"
        - "Negotiation positions anchor around first offer"
        - "First impressions of people persist despite new data"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Decision Style: Intuitive"]

    - id: COG-015
      name: "Availability Heuristic Reliance"
      description: "Tendency to judge frequency or probability by how easily examples come to mind"
      indicators:
        - "Recent events disproportionately influence risk assessment"
        - "Vivid stories outweigh statistical evidence"
        - "Overestimates probability of dramatic outcomes"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "MBTI: Se/Si"]

    - id: COG-016
      name: "Dunning-Kruger Awareness"
      description: "Ability to accurately calibrate own competence relative to actual skill level"
      indicators:
        - "Acknowledges knowledge gaps openly"
        - "Seeks feedback on blind spots"
        - "Adjusts confidence based on domain expertise"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Meta: Self-Assessment Accuracy"]

    - id: COG-017
      name: "Sunk Cost Susceptibility"
      description: "Tendency to continue investing in something because of past investment rather than future value"
      indicators:
        - "Finishes books even when not enjoying them"
        - "Stays in projects past the point of diminishing returns"
        - "Difficulty abandoning strategies that aren't working"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Behavioral: Loss Aversion"]

    - id: COG-018
      name: "Framing Effect Sensitivity"
      description: "Degree to which the presentation of information influences decisions"
      indicators:
        - "Reacts differently to gains vs losses framing"
        - "Marketing language significantly shifts preferences"
        - "Context of presentation changes perceived value"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Social: Persuasion Susceptibility"]

    - id: COG-019
      name: "Hindsight Bias Tendency"
      description: "Tendency to see past events as having been predictable after they occur"
      indicators:
        - "Often says 'I knew that would happen'"
        - "Revises memory of predictions to match outcomes"
        - "Underestimates uncertainty in retrospect"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Meta: Self-Narrative Construction"]

    - id: COG-020
      name: "Bandwagon Effect Susceptibility"
      description: "Tendency to adopt beliefs or behaviors because many others do"
      indicators:
        - "Popularity of an idea increases its appeal"
        - "Social proof heavily influences purchasing decisions"
        - "Aligns opinions with perceived majority"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Social: Conformity Drive"]

    - id: COG-021
      name: "Status Quo Bias"
      description: "Preference for the current state of affairs over change"
      indicators:
        - "Defaults to existing options even when better alternatives exist"
        - "Requires strong justification before switching tools or methods"
        - "Perceives change as loss rather than opportunity"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Behavioral: Routine Preference"]

    - id: COG-022
      name: "Overconfidence Bias"
      description: "Systematic overestimation of own knowledge, abilities, or prediction accuracy"
      indicators:
        - "Sets overly tight confidence intervals"
        - "Underestimates task completion time consistently"
        - "Rarely hedges predictions with uncertainty"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Meta: Self-Assessment Accuracy"]

    - id: COG-023
      name: "Negativity Bias"
      description: "Tendency to give more weight to negative experiences than positive ones"
      indicators:
        - "One negative review outweighs ten positive ones"
        - "Dwells on criticism longer than praise"
        - "Threat detection dominates opportunity scanning"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Emotional: Emotional Reactivity"]

    - id: COG-024
      name: "Peak-End Rule Sensitivity"
      description: "Tendency to judge experiences based on peak moments and endings rather than totality"
      indicators:
        - "Remembers highlights and conclusions vividly"
        - "Rates experiences primarily by their best/worst moments"
        - "Endings disproportionately color overall assessment"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Emotional: Emotional Memory"]

    - id: COG-025
      name: "Recency Bias"
      description: "Tendency to overweight recent events relative to historical data"
      indicators:
        - "Latest results dominate forecasting"
        - "Recent feedback overrides long-term track record"
        - "Current mood colors assessment of long-term trends"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "MBTI: Se"]

    - id: COG-026
      name: "Halo Effect Tendency"
      description: "Tendency to let positive impressions in one area influence judgments in other areas"
      indicators:
        - "Attractive people are assumed to be more competent"
        - "Success in one domain creates assumed expertise in others"
        - "Brand reputation colors product quality perception"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Social: First Impression Weight"]

    - id: COG-027
      name: "Survivorship Bias Awareness"
      description: "Ability to account for hidden failures when analyzing success patterns"
      indicators:
        - "Asks about failure rates, not just success stories"
        - "Seeks disconfirming evidence in case studies"
        - "Questions selection bias in presented data"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "COG-001: Analytical Thinking"]

    - id: COG-028
      name: "Fundamental Attribution Error"
      description: "Tendency to attribute others' behavior to character rather than circumstances"
      indicators:
        - "Judges others' failures as character flaws"
        - "Attributes own failures to circumstances"
        - "Underestimates situational factors in others' behavior"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Social: Empathy Level"]

    - id: COG-029
      name: "Planning Fallacy Susceptibility"
      description: "Tendency to underestimate time, costs, and risks of future actions"
      indicators:
        - "Consistently delivers projects late"
        - "Budgets are regularly exceeded"
        - "Best-case scenarios treated as likely outcomes"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "COG-022: Overconfidence Bias"]

    - id: COG-030
      name: "Choice Overload Sensitivity"
      description: "Degree to which excessive options lead to decision paralysis or dissatisfaction"
      indicators:
        - "Struggles to decide when too many options are present"
        - "Feels regret after choosing from large sets"
        - "Prefers curated recommendations over open catalogs"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Decision Style: Analytical"]

    - id: COG-031
      name: "Zero-Risk Bias"
      description: "Preference for eliminating one risk entirely over a greater overall risk reduction"
      indicators:
        - "Chooses 100% safe option over probabilistically superior alternative"
        - "Overpays for certainty"
        - "Focuses on eliminating visible risks over invisible larger ones"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "Behavioral: Risk Tolerance"]

    - id: COG-032
      name: "Narrative Fallacy Tendency"
      description: "Tendency to construct coherent stories from random or unrelated events"
      indicators:
        - "Sees patterns in noise"
        - "Creates causal explanations for coincidences"
        - "Prefers stories over statistics for understanding"
      strength_scale: "0-100"
      related_systems: ["Cognitive Bias", "MBTI: Ni"]

    # ---- Decision Styles ----
    - id: COG-033
      name: "Analytical Decision Style"
      description: "Preference for thorough data analysis and systematic evaluation before deciding"
      indicators:
        - "Creates pros/cons lists or decision matrices"
        - "Gathers extensive data before committing"
        - "Delays decision until sufficient information is available"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Analytical", "MBTI: Ti/Te"]

    - id: COG-034
      name: "Intuitive Decision Style"
      description: "Preference for gut feeling, pattern recognition, and rapid judgment based on experience"
      indicators:
        - "Makes quick decisions that feel right"
        - "Trusts instinct over spreadsheets"
        - "Can't always articulate reasoning but outcomes are often good"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Intuitive", "MBTI: Ni/Ne"]

    - id: COG-035
      name: "Directive Decision Style"
      description: "Preference for fast, decisive action with minimal deliberation"
      indicators:
        - "Decides quickly and moves on"
        - "Values speed over perfection in decisions"
        - "Comfortable deciding with incomplete information"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Directive", "DISC: Dominance"]

    - id: COG-036
      name: "Conceptual Decision Style"
      description: "Preference for big-picture thinking and creative problem-solving in decisions"
      indicators:
        - "Considers long-term implications and multiple scenarios"
        - "Generates creative alternatives before deciding"
        - "Values innovation and vision in solutions"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Conceptual", "MBTI: Ne/Ni"]

    - id: COG-037
      name: "Collaborative Decision Style"
      description: "Preference for involving others and building consensus before deciding"
      indicators:
        - "Seeks input from stakeholders before committing"
        - "Values buy-in over speed"
        - "Facilitative approach to group decisions"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Collaborative", "DISC: Steadiness"]

    # ---- Pattern Recognition and Processing ----
    - id: COG-038
      name: "Systems Thinking"
      description: "Ability to see interconnections, feedback loops, and emergent properties in complex systems"
      indicators:
        - "Maps cause-and-effect chains across multiple domains"
        - "Identifies leverage points in systems"
        - "Considers second and third-order effects"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni/Te", "Big Five: Openness-Ideas"]

    - id: COG-039
      name: "Linear Sequential Processing"
      description: "Preference for step-by-step, ordered thinking and execution"
      indicators:
        - "Works through tasks in logical sequence"
        - "Uncomfortable jumping between unrelated topics"
        - "Values clear beginning-middle-end structure"
      strength_scale: "0-100"
      related_systems: ["MBTI: Si/Te", "Big Five: Conscientiousness-Order"]

    - id: COG-040
      name: "Parallel Processing Capacity"
      description: "Ability to hold and work with multiple threads of thought simultaneously"
      indicators:
        - "Manages several projects without confusion"
        - "Switches between contexts with minimal ramp-up"
        - "Keeps multiple variables active in working memory"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ne", "Big Five: Openness-Ideas"]

    - id: COG-041
      name: "Abstract Reasoning"
      description: "Ability to think in concepts, principles, and theoretical frameworks"
      indicators:
        - "Extracts principles from specific cases"
        - "Comfortable with ambiguity and theoretical discussion"
        - "Creates mental models and conceptual frameworks"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni/Ti", "Big Five: Openness-Intellect"]

    - id: COG-042
      name: "Concrete Practical Reasoning"
      description: "Preference for tangible, real-world, hands-on thinking and problem-solving"
      indicators:
        - "Asks for specific examples and use cases"
        - "Evaluates ideas by practical applicability"
        - "Prefers 'show me' over 'explain to me'"
      strength_scale: "0-100"
      related_systems: ["MBTI: Se/Si", "Big Five: Openness (inverse)"]

    - id: COG-043
      name: "Divergent Thinking"
      description: "Capacity to generate many different ideas and explore multiple solution paths"
      indicators:
        - "Produces large quantity of ideas in brainstorming"
        - "Makes unusual associations between concepts"
        - "Resists premature convergence on solutions"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ne", "Big Five: Openness-Ideas"]

    - id: COG-044
      name: "Convergent Thinking"
      description: "Ability to evaluate options and narrow down to the single best solution"
      indicators:
        - "Efficiently eliminates inferior options"
        - "Comfortable making final selection from alternatives"
        - "Values decisiveness and closure"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni/Te", "Big Five: Conscientiousness-Deliberation"]

    - id: COG-045
      name: "First Principles Thinking"
      description: "Tendency to reason from fundamental truths rather than by analogy or convention"
      indicators:
        - "Questions assumptions that others take for granted"
        - "Rebuilds understanding from foundational concepts"
        - "Challenges 'that's how it's always been done'"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ti/Ni", "Big Five: Openness-Ideas"]

    - id: COG-046
      name: "Analogical Reasoning"
      description: "Tendency to understand new situations by mapping them to familiar ones"
      indicators:
        - "Uses analogies and metaphors frequently"
        - "Transfers solutions from one domain to another"
        - "Recognizes structural similarities across different contexts"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ne/Si", "Big Five: Openness-Ideas"]

    - id: COG-047
      name: "Probabilistic Thinking"
      description: "Ability to think in probabilities, ranges, and degrees of confidence rather than certainties"
      indicators:
        - "Assigns likelihood estimates to outcomes"
        - "Thinks in ranges rather than point estimates"
        - "Updates probabilities when new evidence appears"
      strength_scale: "0-100"
      related_systems: ["Decision Style: Analytical", "COG-016: Dunning-Kruger Awareness"]

    - id: COG-048
      name: "Counterfactual Thinking"
      description: "Tendency to consider alternative outcomes and 'what if' scenarios retrospectively"
      indicators:
        - "Reflects on how things could have gone differently"
        - "Learns from near-misses and close calls"
        - "Runs mental simulations of alternative decisions"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ne/Ni", "Big Five: Openness-Fantasy"]

    # ---- Information Processing ----
    - id: COG-049
      name: "Detail Orientation"
      description: "Degree of attention to fine details, precision, and accuracy in information"
      indicators:
        - "Catches typos and inconsistencies others miss"
        - "Reads fine print and footnotes"
        - "Values precision in language and numbers"
      strength_scale: "0-100"
      related_systems: ["Big Five: Conscientiousness-Order", "MBTI: Si"]

    - id: COG-050
      name: "Big Picture Focus"
      description: "Tendency to prioritize overall patterns, themes, and strategic direction over details"
      indicators:
        - "Sees the forest, not the trees"
        - "Focuses on strategic direction over tactical execution"
        - "Summarizes complex situations into key themes"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni/Ne", "Big Five: Openness-Ideas"]

    - id: COG-051
      name: "Information Synthesis"
      description: "Ability to combine information from multiple sources into coherent understanding"
      indicators:
        - "Integrates contradictory data into nuanced views"
        - "Creates unified frameworks from diverse inputs"
        - "Identifies common threads across different sources"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ni", "Big Five: Openness-Intellect"]

    - id: COG-052
      name: "Critical Evaluation"
      description: "Tendency to question, test, and validate information before accepting it"
      indicators:
        - "Checks sources and methodology"
        - "Looks for logical fallacies in arguments"
        - "Asks 'what evidence supports this?'"
      strength_scale: "0-100"
      related_systems: ["MBTI: Ti/Te", "Big Five: Openness-Intellect"]

  # ===========================================================================
  # EMOTIONAL — Padroes emocionais, regulacao, reatividade
  # ===========================================================================
  emotional:

    # ---- Big Five: Neuroticism facets ----
    - id: EMO-001
      name: "Anxiety Proneness"
      description: "Tendency to experience worry, nervousness, and apprehension about the future"
      indicators:
        - "Frequently worries about potential problems"
        - "Physical tension in uncertain situations"
        - "Difficulty relaxing when outcomes are unclear"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Anxiety", "Enneagram: 6"]

    - id: EMO-002
      name: "Anger Threshold"
      description: "Ease with which frustration and irritation are triggered"
      indicators:
        - "Quick to express dissatisfaction"
        - "Low tolerance for perceived incompetence"
        - "Impatience visible under pressure"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Angry Hostility", "Enneagram: 8"]

    - id: EMO-003
      name: "Depressive Tendency"
      description: "Susceptibility to feelings of sadness, hopelessness, and low energy"
      indicators:
        - "Prolonged recovery from setbacks"
        - "Pessimistic outlook during difficult periods"
        - "Withdrawal from social interaction when stressed"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Depression", "Enneagram: 4"]

    - id: EMO-004
      name: "Self-Consciousness Level"
      description: "Degree of sensitivity to how one is perceived by others"
      indicators:
        - "Uncomfortable being the center of attention"
        - "Replays social interactions looking for mistakes"
        - "Avoids situations with high social evaluation"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Self-Consciousness", "Enneagram: 4/6"]

    - id: EMO-005
      name: "Impulsive Reactivity"
      description: "Tendency to act on emotions before thinking them through"
      indicators:
        - "Makes decisions in the heat of the moment"
        - "Emotional spending or commitments"
        - "Says things later regretted during emotional peaks"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Impulsiveness", "MBTI: Se/Fe"]

    - id: EMO-006
      name: "Stress Vulnerability"
      description: "Degree to which stressors overwhelm coping capacity"
      indicators:
        - "Performance degrades significantly under pressure"
        - "Difficulty maintaining perspective during crises"
        - "Physical symptoms appear under sustained stress"
      strength_scale: "0-100"
      related_systems: ["Big Five: Neuroticism-Vulnerability", "Enneagram: 6"]

    # ---- Big Five: Agreeableness facets (emotional dimension) ----
    - id: EMO-007
      name: "Trust Default"
      description: "Baseline level of trust extended to others before evidence"
      indicators:
        - "Gives people the benefit of the doubt"
        - "Takes people at their word initially"
        - "Assumes good intentions in ambiguous situations"
      strength_scale: "0-100"
      related_systems: ["Big Five: Agreeableness-Trust", "Enneagram: 9"]

    - id: EMO-008
      name: "Straightforward Honesty"
      description: "Degree to which one communicates directly and transparently"
      indicators:
        - "Says what they think without sugar-coating"
        - "Avoids manipulation or hidden agendas"
        - "Values directness over diplomacy"
      strength_scale: "0-100"
      related_systems: ["Big Five: Agreeableness-Straightforwardness", "DISC: Dominance"]

    - id: EMO-009
      name: "Altruistic Drive"
      description: "Genuine concern for the welfare of others and willingness to help"
      indicators:
        - "Volunteers time and resources for others"
        - "Puts others' needs above personal convenience"
