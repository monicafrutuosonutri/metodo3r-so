    evidence_mius: ["MIU-0060", "MIU-0029", "MIU-0099"]
    evidence_sources: ["genius-zone-blueprint.md", "entrevista-profunda-09abr2026.md"]
    behavioral_manifestation: >
      'Cabeca ramifica demais e abre mil caixinhas e possibilidades. Fico
      paralisado, ansioso.' (P12 interview). The overwhelm pattern: accumulate
