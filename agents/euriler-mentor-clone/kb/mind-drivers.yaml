  - id: "DRV-011"
    name: "Kolbe Loop (FF7+QS7+FT4)"
    category: "COGNITION"
    strength: 78
    description: >
      The Kolbe profile creates a specific cognitive loop: Quick Start 7
      wants to BEGIN → Fact Finder 7 says 'wait, need more research' →
      discovers 10 things → QS7 wants to start all 10 → FF7 wants more
