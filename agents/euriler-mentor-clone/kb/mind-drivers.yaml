  - id: "DRV-012"
    name: "Three-Layer Excavation"
    category: "COGNITION"
    strength: 82
    description: >
      When diagnosing any problem — personal, business, or conceptual —
      Euriler automatically digs three layers: Symptom (what's visible) →
      False Problem (what they think is wrong) → Root Cause (what's actually
      wrong). This maps perfectly to his Jornada de Consciencia framework.
      He never accepts the surface answer.
    evidence_mius: ["MIU-M050", "MIU-T010", "MIU-T014"]
    evidence_sources: ["posicionamento_todas as aulas.txt", "ndf-teoria-v6.md"]
    behavioral_manifestation: >
      Always asks 'por que?' at least twice. Distinguishes 'problema impostor'
      from 'causa oculta.' When a mentor says 'I need more followers,' Euriler
      hears 'I don't have a tese.' When experts say 'I need a launcher,' he
      hears 'I'm afraid of taking ownership.'
